# ==============================
# 1. SERVER & EUREKA
# ==============================
server.port=8900
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ==============================
# 2. ZUUL GATEWAY CONFIG
# ==============================
zuul.prefix=/api
zuul.ignored-services=*

# ==============================
# 3. MICROSERVICES ROUTES
# ==============================
# User service
zuul.routes.user.path=/accounts/**
zuul.routes.user.service-id=user-service

# Catalog service
zuul.routes.catalog.path=/catalog/**
zuul.routes.catalog.service-id=product-catalog-service

# Order service
zuul.routes.order.path=/shop/**
zuul.routes.order.service-id=order-service

# Recommendation service
zuul.routes.recommendation.path=/review/**
zuul.routes.recommendation.service-id=product-recommendation-service

# Shipping service
zuul.routes.shipping.path=/delivery/**
zuul.routes.shipping.service-id=shipping-service

# ==============================
# 4. SPRING SESSION & REDIS
# ==============================
spring.session.store-type=redis
spring.session.redis.namespace=session
spring.session.redis.flush-mode=on-save
spring.redis.host=localhost
spring.redis.port=6379

# ==============================
# 5. SECURITY & CORS FIXES
# ==============================
# Cho phép Cookie/Session truyền qua Gateway
zuul.sensitive-headers=

# TUYỆT CHIÊU CUỐI: Chặn đứng mọi Header CORS thừa thãi từ các service con dội lên,
# chỉ giữ lại duy nhất cấu hình CORS của Gateway để trình duyệt không bị lỗi.
zuul.ignored-headers=Access-Control-Allow-Origin, Access-Control-Allow-Credentials, Access-Control-Allow-Methods, Access-Control-Allow-Headers